engine: docker
iterations: 5
warmups: 1
cpu_limit: "1.0"
memory_limit: "1g"
network_disabled: true
target_wall_seconds: 0.25
max_repeat_factor: 250
sizes: [s, m, l]
languages: [php, python, java, cpp, node, go, rust]
default_tasks: all
smoke_tasks: [sort_integers, matrix_multiplication, csv_parsing, prime_sieve, simple_web_server, api_client, gui_calculator]
results_dir: results
baseline_runtime: python-3.12

ui_driver_image: languages-benchmark:ui-driver

presets:
  dev:
    tasks: smoke
    langs: all
    sizes: [s, m, l]
    iterations: 1
    warmups: 0
    jobs: 1
  publish:
    tasks: all
    langs: all
    sizes: [s, m, l]
    iterations: 3
    warmups: 1
    jobs: 1
  release:
    tasks: all
    langs: all
    sizes: [s, m, l]
    iterations: 5
    warmups: 1
    jobs: 1
  full-release:
    tasks: all
    langs: all
    sizes: [s, m, l]
    iterations: 7
    warmups: 2
    jobs: 1

language_variants:
  php-5.6:
    family: php
    implementation: php56
    label: PHP 5.6
    version: "5.6"
    dockerfile: tasks/implementations/php56/Dockerfile
    base_image: php:5.6-cli
    runtime_version_command: php -v | head -n1
  php-7.4:
    family: php
    label: PHP 7.4
    version: "7.4"
    dockerfile: tasks/implementations/php/Dockerfile
    base_image: php:7.4-cli
    runtime_version_command: php -v | head -n1
  php-7.2:
    family: php
    label: PHP 7.2
    version: "7.2"
    dockerfile: tasks/implementations/php/Dockerfile
    base_image: php:7.2-cli
    runtime_version_command: php -v | head -n1
  php-8.4:
    family: php
    label: PHP 8.4
    version: "8.4"
    dockerfile: tasks/implementations/php/Dockerfile
    base_image: php:8.4-cli
    runtime_version_command: php -v | head -n1
  python-2.7:
    family: python
    implementation: python2
    label: Python 2.7
    version: "2.7"
    dockerfile: tasks/implementations/python2/Dockerfile
    base_image: python:2.7-slim
    runtime_version_command: python --version
  python-3.8:
    family: python
    label: Python 3.8
    version: "3.8"
    dockerfile: tasks/implementations/python/Dockerfile
    base_image: python:3.8-slim
    runtime_version_command: python --version
  python-3.11:
    family: python
    label: Python 3.11
    version: "3.11"
    dockerfile: tasks/implementations/python/Dockerfile
    base_image: python:3.11-slim
    runtime_version_command: python --version
  python-3.12:
    family: python
    label: Python 3.12
    version: "3.12"
    dockerfile: tasks/implementations/python/Dockerfile
    base_image: python:3.12-slim
    runtime_version_command: python --version
  java-21:
    family: java
    label: Java 21
    version: "21"
    dockerfile: tasks/implementations/java/Dockerfile
    build_image: eclipse-temurin:21-jdk-jammy
    runtime_image: eclipse-temurin:21-jdk-jammy
    runtime_version_command: java -version 2>&1 | head -n1
  cpp-14:
    family: cpp
    label: C++ (GCC 14)
    version: "14"
    dockerfile: tasks/implementations/cpp/Dockerfile
    build_image: gcc:14-bookworm
    runtime_image: gcc:14-bookworm
    runtime_version_command: g++ --version | head -n1
  node-22:
    family: node
    label: Node.js 22
    version: "22"
    dockerfile: tasks/implementations/node/Dockerfile
    base_image: node:22-slim
    runtime_version_command: node --version
  bun-1.3.12:
    family: node
    implementation: node
    label: Bun 1.3.12
    version: "1.3.12"
    dockerfile: tasks/implementations/bun/Dockerfile
    base_image: oven/bun:1.3.12
    runtime_version_command: bun --version
  deno-2.7.6:
    family: node
    implementation: node
    label: Deno 2.7.6
    version: "2.7.6"
    dockerfile: tasks/implementations/deno/Dockerfile
    base_image: denoland/deno:2.7.6
    runtime_version_command: deno --version | head -n1
  go-1.23:
    family: go
    label: Go 1.23
    version: "1.23"
    dockerfile: tasks/implementations/go/Dockerfile
    build_image: golang:1.23-bookworm
    runtime_image: debian:bookworm-slim
    runtime_version_command: echo Go 1.23 \(built from golang:1.23-bookworm\)
  rust-1.82:
    family: rust
    label: Rust 1.82
    version: "1.82"
    dockerfile: tasks/implementations/rust/Dockerfile
    build_image: rust:1.82-slim-bookworm
    runtime_image: debian:bookworm-slim
    runtime_version_command: echo Rust 1.82 \(built from rust:1.82-slim-bookworm\)
