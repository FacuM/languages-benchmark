<text x='430.0' y='28' text-anchor='middle' font-size='20' fill='#000'>
<tspan x='430.0' dy='0'>Scalability score (0-100, higher is better) — language</tspan>
<tspan x='430.0' dy='22'>best-case</tspan>
</text>
<text x='430.0' y='72' text-anchor='middle' font-size='12' fill='#555'>
<tspan x='430.0' dy='0'>Aggregate scalability score derived from how gracefully runtime and memory grow from S to M</tspan>
<tspan x='430.0' dy='16'>to L.</tspan>
</text>
